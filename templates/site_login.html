{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center py-4 py-lg-5">
  <div class="col-11 col-sm-9 col-md-6 col-lg-5">
    <div class="card lr-card shadow-sm border-0">
      <div class="card-body p-4 p-lg-5">
        <p class="lr-kicker mb-2">Proteção do site</p>
        <h1 class="h4 fw-semibold mb-2">Acesso ao LitReview</h1>
        <p class="text-muted small mb-4 lh-sm">
          Esta instância está protegida por senha. Introduz a palavra-passe que o administrador te indicou.
        </p>
        <form method="post" action="{{ url_for('site_login') }}">
          <input type="hidden" name="next" value="{{ next|e }}">
          <label for="siteAccessPwd" class="form-label small fw-medium">Senha</label>
          <input class="form-control form-control-lg mb-3" type="password" id="siteAccessPwd" name="password"
            autocomplete="current-password" required autofocus aria-required="true">
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
